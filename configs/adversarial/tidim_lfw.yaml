# Adversarial De-identification: TI-DIM on LFW
# Reference: Dong et al. "Evading Defenses to Transferable Adversarial Examples
#            by Translation-Invariant Attacks" (CVPR 2019)
# Usage: python scripts/run_adversarial_deid.py --config configs/adversarial/tidim_lfw.yaml

dataset: lfw
method: tidim
epsilon: 0.06275    # 16/255
alpha: 0.006275     # epsilon / num_iter
num_iter: 10
decay_factor: 1.0
kernel_size: 15
kernel_sigma: 3.0
dim_prob: 0.4
dim_range: 0.1
seed: 0

# Pretrained model paths
retinaface_model: ./weight/retinaface_pre_trained/Resnet50_Final.pth
arcface_model: ./weight/ms1mv3_arcface_r100_fp16/backbone.pth
cosface_model: ./weight/glint360k_cosface_r50_fp16_0.1/backbone.pth
adaface_model: ./weight/adaface_pre_trained/adaface_ir50_ms1mv2.ckpt

save_dir: runs/inference/tidim_lfw
device: cuda
